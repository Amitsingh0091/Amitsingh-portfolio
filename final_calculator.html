<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" type="text/css" href="final_calculator.css">
</head>
<body>
	<form>

		<input class="box11" type="text" placeholder="0" name="display">
<br>
		<div class="d1">	
		<input  class="numbtn" type="button" name="inp1" value="AC" onclick="display.value = ' ' ">
		<input class="numbtn" type="button" name="inp1" value="X"  onclick="display.value = display.value.toString().slice(0,-1)">
		<input class="numbtn" type="button" name="inp_multi" value="*"  onclick="display.value += '*' ">
		<input class="numbtn"  type="button" name="inp_divide" value="/"  onclick="display.value += '/' ">
            
	      <br>
		<input class="numbtn" type="button" name="inp7" value="7" onclick="display.value += '7' ">
		<input class="numbtn" type="button" name="inp8" value="8" onclick="display.value += '8' ">
		<input class="numbtn" type="button" name="inp9" value="9" onclick="display.value += '9' ">
		<input class="numbtn" type="button" name="inp_add" value="+" onclick="display.value += '+' ">
    <br>
		<input class="numbtn" type="button" name="inp4" value="4" onclick="display.value += '4' ">
		<input class="numbtn" type="button" name="inp5" value="5" onclick="display.value += '5' ">
		<input class="numbtn" type="button" name="inp6" value="6" onclick="display.value += '6' ">
		<input class="numbtn" type="button" name="inp_sub" value="-" onclick="display.value += '-' ">
        <br>    
	
		<input class="numbtn" type="button" name="inp1" value="1" onclick="display.value += '1' ">
		<input class="numbtn" type="button" name="inp2" value="2" onclick="display.value += '2' ">
		<input class="numbtn" type="button" name="inp3" value="3" onclick="display.value += '3' ">
		<input class="numbtn" type="button" name="inp_remender" value="%" onclick="display.value += '%' ">
            <br>
	
		<input class="numbtn" type="button" name="inp00" value="00" onclick="display.value += '00' ">
		<input class="numbtn" type="button" name="inp0" value="0" onclick="display.value += '0' ">
		<input class="numbtn" type="button" name="inp_dot" value="." onclick="display.value += '.' ">
		<input class="numbtn" type="button" name="inp_eqal" value="=" onclick="display.value = eval(display.value)">
            
	</div>

</form>
        <button onclick="backbtn()" class="backbtn"> Back To The Project Page</button>
        <script>
        	function backbtn(){
        		document.location.href="projects.html";
        	}
        </script>
</body>
</html>
