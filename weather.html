<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather App</title>
<link rel="stylesheet" type="text/css" href="weather.css">
</head>

<body>

<header>
  <div class="nav">
    <h1>आज का मौसम</h1>
    <div class="search">
      <input type="text" id="cityInput" placeholder="Enter city">
      <button id="searchBtn">Search</button>
    </div>
  </div>
</header>

<main>
<p class="error" id="error"></p>
  <!-- Current Weather -->
  <div class="card">
    <div class="city" id="cityName"> </div>

    <div class="weather-box">
      <div class="box temp"><span>Temperature</span><strong id="temp">-- °C</strong></div>
      <div class="box"><span>Humidity</span><strong id="humidity">-- %</strong></div>
      <div class="box"><span>Wind Speed</span><strong id="wind">-- m/s</strong></div>
      <div class="box"><span>Condition</span><strong id="condition">---</strong></div>
      <div class="box"><span>Feels Like</span><strong id="feels">-- °C</strong></div>
      <div class="box sun"><span>Sunrise</span><strong id="sunrise">--</strong></div>
      <div class="box sun"><span>Sunset</span><strong id="sunset">--</strong></div>
    </div>
  </div>

  <!-- Forecast -->
  <div class="forecast">
    <div class="forecast-card">
      <h3>Previous Day</h3>
      <p>Not available (Free API)</p>
    </div>

    <div class="forecast-card">
      <h3>Next Day</h3>
      <p id="nextTemp">Temp: -- °C</p>
      <p id="nextCond">Condition: ---</p>
      <p id="nextHum">Humidity: -- %</p>
    </div>
  </div>



</main>

<script>
const apiKey = "1e245d0b12ec63c21d060693a118d44c";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const error = document.getElementById("error");

// Enter key
cityInput.addEventListener("keydown", e=>{
  if(e.key==="Enter") getWeather();
});
searchBtn.addEventListener("click", getWeather);

async function getWeather(){
  const city = cityInput.value.trim();
  if(!city) return;

  error.textContent = "";

  try{
    /* Current Weather */
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`
    );
    const data = await res.json();

    if(data.cod !== 200){
      error.textContent = "CITY NOT FOUND😒";
      return;
    }

    document.getElementById("cityName").textContent = data.name;
    document.getElementById("temp").textContent = Math.round(data.main.temp)+" °C";
    document.getElementById("humidity").textContent = data.main.humidity+" %";
    document.getElementById("wind").textContent = data.wind.speed+" m/s";
    document.getElementById("condition").textContent = data.weather[0].main;
    document.getElementById("feels").textContent = Math.round(data.main.feels_like)+" °C";
    document.getElementById("sunrise").textContent =
      new Date(data.sys.sunrise*1000).toLocaleTimeString();
    document.getElementById("sunset").textContent =
      new Date(data.sys.sunset*1000).toLocaleTimeString();

    /* Forecast (Next Day) */
    const fres = await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`
    );
    const fdata = await fres.json();

    const tomorrow = fdata.list[8]; // ~24 hours later
    document.getElementById("nextTemp").textContent =
      "Temp: "+Math.round(tomorrow.main.temp)+" °C";
    document.getElementById("nextCond").textContent =
      "Condition: "+tomorrow.weather[0].main;
    document.getElementById("nextHum").textContent =
      "Humidity: "+tomorrow.main.humidity+" %";

  }catch{
    error.textContent = "Something went wrong";
  }
}
</script>

</body>
</html>
